              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "description": "The process of hiding irrelevant details from the user and showing only necessary information.", "id": "N1", "label": "Data Abstraction", "shape": "dot", "size": 10, "title": "The process of hiding irrelevant details from the user and showing only necessary information."}, {"color": "#97c2fc", "description": "Total three levels in database management system: View level, conceptual level, and physical level.", "id": "N3", "label": "Levels of Data Abstraction", "shape": "dot", "size": 10, "title": "Total three levels in database management system: View level, conceptual level, and physical level."}, {"color": "#97c2fc", "description": "The lowest level of data abstraction, defining how data are stored and its location in memory, completely handled by the database administrator.", "id": "N4", "label": "Physical Level (Internal Schema)", "shape": "dot", "size": 10, "title": "The lowest level of data abstraction, defining how data are stored and its location in memory, completely handled by the database administrator."}, {"color": "#97c2fc", "description": "The level that defines what data are stored in the database, relationships among data, and the structure of the entire database, handled by DBA, programmer, or developer.", "id": "N5", "label": "Conceptual Level (Logical Level)", "shape": "dot", "size": 10, "title": "The level that defines what data are stored in the database, relationships among data, and the structure of the entire database, handled by DBA, programmer, or developer."}, {"color": "#97c2fc", "description": "The level that tells the application how data should be shown to the user, providing multiple views of the same database for user interaction.", "id": "N6", "label": "View Level (External Schema)", "shape": "dot", "size": 10, "title": "The level that tells the application how data should be shown to the user, providing multiple views of the same database for user interaction."}, {"color": "#97c2fc", "description": "Users and data should not directly interact with each other.", "id": "N2", "label": "Data Independence", "shape": "dot", "size": 10, "title": "Users and data should not directly interact with each other."}, {"color": "#97c2fc", "description": "An entity responsible for deciding data storage, arrangement, and managing the physical and conceptual levels of data abstraction.", "id": "N8", "label": "Database Administrator (DBA)", "shape": "dot", "size": 10, "title": "An entity responsible for deciding data storage, arrangement, and managing the physical and conceptual levels of data abstraction."}, {"color": "#97c2fc", "description": "An entity that accesses the system, shown only necessary information, and directly interacts with the view level.", "id": "N9", "label": "User", "shape": "dot", "size": 10, "title": "An entity that accesses the system, shown only necessary information, and directly interacts with the view level."}, {"color": "#97c2fc", "description": "A system where data abstraction and data independence are applied and managed.", "id": "N7", "label": "Database Management System (DBMS)", "shape": "dot", "size": 10, "title": "A system where data abstraction and data independence are applied and managed."}]);

                  var options = {
    "configure": {

};
